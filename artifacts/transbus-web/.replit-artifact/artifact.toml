kind = "web"
previewPath = "/"
title = "TransBus - Panel de Rutas"
version = "1.0.0"
id = "artifacts/transbus-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24126

[services.development]
run = "pnpm --filter @workspace/transbus-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/transbus-web", "run", "build" ]
publicDir = "artifacts/transbus-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24126"
BASE_PATH = "/"
